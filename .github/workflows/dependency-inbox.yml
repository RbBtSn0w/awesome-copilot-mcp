name: Dependency Inbox

on:
  schedule:
    - cron: '0 1 * * 1-5'
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Collect open Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list \
            --search "author:app/dependabot state:open" \
            --state open \
            --json number,title,url,labels,updatedAt > open-dependabot-prs.json

      - name: Check automation health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check the last 3 runs of critical workflows
          gh run list --workflow upstream-sync.yml --limit 3 --json status,conclusion > upstream-sync-health.json
          gh run list --workflow dependabot-auto-merge.yml --limit 3 --json status,conclusion > auto-merge-health.json

      - name: Render inbox markdown
        run: |
          node scripts/dependency-automation.js render-inbox \
            --input open-dependabot-prs.json \
            --upstream-health upstream-sync-health.json \
            --merge-health auto-merge-health.json > dependency-inbox.md
          cat dependency-inbox.md

      - name: Create, update or close inbox issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="$(gh issue list --search 'Dependency Inbox in:title' --state open --json number --limit 1 | node -e "const issues = JSON.parse(require('fs').readFileSync(0, 'utf8')); process.stdout.write(issues.length ? String(issues[0].number) : '');")"
          PR_COUNT=$(cat open-dependabot-prs.json | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).length)")

          if [ "$PR_COUNT" -eq 0 ]; then
            if [ -n "$ISSUE_NUMBER" ]; then
              echo "No open PRs. Closing inbox issue #$ISSUE_NUMBER"
              gh issue close "$ISSUE_NUMBER" --comment "All dependencies are up to date. Closing automated dashboard."
            else
              echo "No open PRs and no open inbox issue. Nothing to do."
            fi
          else
            if [ -n "$ISSUE_NUMBER" ]; then
              echo "Updating existing inbox issue #$ISSUE_NUMBER"
              gh issue edit "$ISSUE_NUMBER" --title "Dependency Inbox" --body-file dependency-inbox.md
            else
              echo "Creating new inbox issue"
              gh issue create --title "Dependency Inbox" --body-file dependency-inbox.md --label dependencies
            fi
          fi
