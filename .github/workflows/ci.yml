name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate (22.x)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run quality gate
      run: npm run ci:quality

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage/lcov.info
        token: ${{ secrets.CODECOV_TOKEN }}

  compatibility:
    name: Node Compatibility (${{ matrix.node-version }}.x)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}.x
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run compatibility checks
      run: npm run ci:compat

  ci-success:
    name: CI Success
    needs: [quality-gate, compatibility]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Verify all CI jobs passed
      run: |
        results=(
          "${{ needs.quality-gate.result }}"
          "${{ needs.compatibility.result }}"
        )

        for result in "${results[@]}"; do
          if [[ "$result" != "success" ]]; then
            echo "::error::CI job failed or was cancelled ($result)"
            exit 1
          fi
        done

        echo "All CI jobs passed."
