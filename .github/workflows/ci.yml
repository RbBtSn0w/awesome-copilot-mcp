name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate (22.x)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run quality gate
      run: npm run ci:quality

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage/lcov.info
        token: ${{ secrets.CODECOV_TOKEN }}

  compat-node20:
    name: Node Compatibility (20.x)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run compatibility checks
      run: npm run ci:compat

  compat-node24:
    name: Node Compatibility (24.x)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run compatibility checks
      run: npm run ci:compat

  ci-success:
    name: CI Success
    needs: [quality-gate, compat-node20, compat-node24]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Verify all CI jobs passed
      run: |
        results=(
          "${{ needs.quality-gate.result }}"
          "${{ needs.compat-node20.result }}"
          "${{ needs.compat-node24.result }}"
        )

        for result in "${results[@]}"; do
          if [[ "$result" != "success" ]]; then
            echo "::error::CI job failed or was cancelled ($result)"
            exit 1
          fi
        done

        echo "All CI jobs passed."

  publish-beta:
    name: Publish Beta Release to npm
    needs: ci-success
    runs-on: ubuntu-latest
    # Only run publish on manual trigger from main branch
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write # Required for NPM provenance and Granular Token OIDC

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Set Beta Version
      run: |
        # Generate timestamp in YYYYMMDDHHmm format
        TIMESTAMP=$(date +%Y%m%d%H%M)
        # Update version to 0.0.1-beta.202401292130
        npm version prerelease --preid=beta.${TIMESTAMP} --no-git-tag-version
        echo "Version set to $(node -p "require('./package.json').version")"

    - name: Publish to npm
      run: |
        npm publish --tag beta --provenance --access public
