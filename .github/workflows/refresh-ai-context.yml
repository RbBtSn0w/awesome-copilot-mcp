name: Refresh AI Context (Context7)

on:
  release:
    types: [published, edited]
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'src/**'
      - '.mcp/**'
      - 'context7.json'
  workflow_dispatch:

jobs:
  refresh:
    name: Sync Repository Knowledge to Context7
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Context7 Refresh
        env:
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
          DOCS_REPO_URL: "${{ github.server_url }}/${{ github.repository }}"
        run: |
          echo "Triggering Context7 refresh for $DOCS_REPO_URL"
          curl -s -X POST https://context7.com/api/v1/refresh \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CONTEXT7_API_KEY" \
            -d "{\"docsRepoUrl\": \"$DOCS_REPO_URL\"}"