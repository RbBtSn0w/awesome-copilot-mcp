name: Upstream Sync

on:
  schedule:
    - cron: '0 0 */2 * *' # Every 2 days at midnight
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      SYNC_BRANCH: automation/upstream-sync
      PR_TITLE: "fix: sync upstream data"

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Check for Upstream Updates
        id: check
        run: node scripts/sync-upstream.js

      - name: Validate Sync Update
        if: steps.check.outputs.updated == 'true'
        run: |
          npm ci
          npm run ci:quality

      - name: Open Sync Pull Request
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          UPSTREAM_SHA: ${{ steps.check.outputs.sha }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -B "$SYNC_BRANCH"
          git add .upstream-sync
          git commit -m "$PR_TITLE"
          git fetch --no-tags origin "+refs/heads/$SYNC_BRANCH:refs/remotes/origin/$SYNC_BRANCH" || true
          git push --force-with-lease origin "$SYNC_BRANCH"

          cat > pr-body.md <<EOF
          Automated update of the tracked upstream awesome-copilot commit.

          - Upstream SHA: \`$UPSTREAM_SHA\`
          - Source workflow: \`${{ github.workflow }} #${{ github.run_number }}\`
          EOF

          # We use 'gh api' because 'gh pr list --head' does not support '<owner>:<branch>' syntax,
          # which is needed for robust PR detection when syncing from specific branches or forks.
          PR_NUMBER=$(gh api --method GET "/repos/$GITHUB_REPOSITORY/pulls" \
            -f head="$GITHUB_REPOSITORY_OWNER:$SYNC_BRANCH" \
            -f base="$DEFAULT_BRANCH" \
            -f state=open \
            --jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$PR_TITLE" \
              --body-file pr-body.md \
              --add-label "deps:merge:auto" \
              --add-label "deps:risk:low"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$DEFAULT_BRANCH" \
              --head "$SYNC_BRANCH" \
              --title "$PR_TITLE" \
              --body-file pr-body.md \
              --label "deps:merge:auto" \
              --label "deps:risk:low"
          fi
